packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@ffmpeg-installer/darwin-arm64': true
  '@ffmpeg-installer/linux-x64': true
  '@parcel/watcher': true
  bufferutil: true
  core-js: true
  es5-ext: true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
overrides:
  '@types/react': 19.2.14
  '@types/react-dom': 19.2.3
