# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: "CI - Next.js"

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
        description: "Name of the package or application to analzye"
      path:
        required: true
        type: string
        description: "Path to the package or application to analzye"
      vercelProjectIdSecretName:
        required: true
        type: string
        description: "Name of the secret containing the Vercel project ID"
      testShardMatrix:
        required: false
        type: string
        description: "JSON matrix of Playwright test shards or named args to run"
        default: '[{"index":1,"total":1}]'
      testShardPrepareScript:
        required: false
        type: string
        description: "Package script to run after build and before sharded tests"
        default: ""
      testShardRunScript:
        required: false
        type: string
        description: "Package script that runs Playwright tests for a shard"
        default: "test:run"

env:
  VERCEL_PROJECT_ID: ${{ secrets[format(inputs.vercelProjectIdSecretName)] }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  TURBO_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  TURBO_TEAM: gredice

jobs:
  lint:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v6.0.4
        name: ✨ Install pnpm

      - name: ✨ Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.15.0"

      - name: ✨ Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5.0.5
        name: ✨ Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦️ Install dependencies
        run: pnpm install --frozen-lockfile --filter ${{ inputs.name }}... --filter .

      - name: 🔎 Lint app
        run: pnpm lint --filter=${{ inputs.name }}
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    name: "test${{ matrix.shard.name && format(' ({0})', matrix.shard.name) || (matrix.shard.total != 1 && format(' ({0}/{1})', matrix.shard.index, matrix.shard.total) || '') }}"
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(inputs.testShardMatrix) }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v6.0.4
        name: ✨ Install pnpm

      - name: ✨ Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.15.0"

      - name: ✨ Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5.0.5
        name: ✨ Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦️ Install dependencies
        run: pnpm install --frozen-lockfile --filter ${{ inputs.name }}... --filter .

      - name: ✨ Setup Vercel CLI
        run: npm i --global vercel@latest

      - name: ⚙️ Pull Vercel Environment Information
        run: vercel env pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ${{ inputs.path }}/

      - name: 🔎 Check Playwright dependency
        id: playwright
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const packageJson = JSON.parse(
            fs.readFileSync('${{ inputs.path }}/package.json', 'utf8'),
          );
          const dependencies = {
            ...packageJson.dependencies,
            ...packageJson.devDependencies,
          };
          const hasPlaywright =
            '@playwright/test' in dependencies || 'playwright' in dependencies;
          const playwrightVersion =
            dependencies['@playwright/test'] ?? dependencies.playwright ?? 'none';

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `enabled=${hasPlaywright}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${playwrightVersion}\n`);
          NODE

      - name: ✨ Cache Playwright browsers
        if: steps.playwright.outputs.enabled == 'true'
        uses: actions/cache@v5.0.5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: 📦️ Install playwright browsers
        if: steps.playwright.outputs.enabled == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
        working-directory: ${{ inputs.path }}/

      - name: ⚒️ Test app
        env:
          TEST_ARGS: ${{ matrix.shard.args || (matrix.shard.total != 1 && format('--shard={0}/{1}', matrix.shard.index, matrix.shard.total)) || '' }}
        run: |
          if [ -z "$TEST_ARGS" ]; then
            pnpm test --filter=${{ inputs.name }}
          else
            pnpm build --filter=${{ inputs.name }}
            if [ -n "${{ inputs.testShardPrepareScript }}" ]; then
              pnpm --dir ${{ inputs.path }} run ${{ inputs.testShardPrepareScript }}
            fi
            pnpm --dir ${{ inputs.path }} run ${{ inputs.testShardRunScript }} $TEST_ARGS
          fi
