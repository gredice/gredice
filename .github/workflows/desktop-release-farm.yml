# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: "Release - Desktop (farm)"

on:
  push:
    tags:
      - "desktop-farm-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.3). Defaults to the tag suffix when triggered by a tag."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a pre-release."
        required: false
        type: boolean
        default: false
      draft:
        description: "Create the GitHub release as a draft."
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  resolve_version:
    name: "Resolve release version"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: 🏷️ Resolve release version
        id: version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${DISPATCH_VERSION}" ]; then
            VERSION="${DISPATCH_VERSION}"
          elif [[ "${GITHUB_REF}" == refs/tags/desktop-farm-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/desktop-farm-v}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Single timestamp shared across all downstream jobs so the DMG
            # filenames, package version, tag, and release name agree.
            VERSION="0.0.0-$(date -u +%Y%m%d%H%M%S)"
          else
            echo "::error::Unable to resolve release version. Trigger this workflow with a desktop-farm-v* tag or provide a workflow_dispatch version input." >&2
            exit 1
          fi
          TAG="desktop-farm-v${VERSION}"
          echo "Resolved version: ${VERSION}"
          echo "Resolved tag: ${TAG}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build:
    name: "Build macOS arm64 DMG"
    needs: resolve_version
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
      APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v6.0.8
        name: ✨ Install pnpm

      - name: ✨ Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.15.0"

      - name: ✨ Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5.0.5
        name: ✨ Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - uses: actions/cache@v5.0.5
        name: ✨ Setup electron-builder cache
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('apps/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: 📦️ Install dependencies
        run: pnpm install --frozen-lockfile --filter desktop... --filter .

      - name: 🔐 Prepare macOS signing and notarization
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
        working-directory: apps/desktop
        run: node scripts/prepare-macos-signing-env.mjs

      - name: 🛠️ Build Gredice Farm desktop DMG (arm64)
        env:
          GREDICE_DESKTOP_VERSION: ${{ needs.resolve_version.outputs.version }}
        working-directory: apps/desktop
        run: pnpm dist:farm --mac --arm64

      - name: 📤 Upload DMG artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: gredice-farm-desktop-arm64
          path: |
            apps/desktop/dist/farm/*.dmg
            apps/desktop/dist/farm/*.dmg.blockmap
          if-no-files-found: error
          retention-days: 14

  release:
    name: "Publish GitHub Release"
    needs: [resolve_version, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Download DMG artifacts
        uses: actions/download-artifact@v6.0.0
        with:
          path: release-artifacts
          pattern: gredice-farm-desktop-*
          merge-multiple: true

      - name: 📜 List artifacts
        shell: bash
        run: ls -lR release-artifacts

      - name: 🚀 Create or update GitHub release
        uses: softprops/action-gh-release@v2.2.2
        with:
          name: "Gredice Farm Desktop ${{ needs.resolve_version.outputs.version }}"
          tag_name: ${{ needs.resolve_version.outputs.tag }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*.dmg
            release-artifacts/*.dmg.blockmap
