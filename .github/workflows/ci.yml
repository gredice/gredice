# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: "CI"

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# Keep only the latest CI run per workflow + PR/branch, cancel obsolete in-progress runs.
# For PR events we scope by PR number, and for branch events we scope by ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  TURBO_TEAM: gredice

jobs:
  changes:
    name: "Detect changes"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 1
      - uses: dorny/paths-filter@v4.0.2
        id: filter
        with:
          filters: |
            app_www:
              - apps/www/**
              - packages/client/**
              - packages/directory-types/**
              - packages/game/**
              - packages/js/**
              - packages/storage/**
              - packages/ui/**
              - .github/workflows/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - turbo.json
            app_news:
              - apps/news/**
              - packages/client/**
              - packages/storage/**
              - packages/ui/**
              - .github/workflows/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - turbo.json
            app_garden:
              - apps/garden/**
              - packages/client/**
              - packages/game/**
              - packages/js/**
              - packages/ui/**
              - .github/workflows/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - turbo.json
            app_farm:
              - apps/farm/**
              - packages/auth/**
              - packages/client/**
              - packages/js/**
              - packages/label-printer/**
              - packages/storage/**
              - packages/ui/**
              - .github/workflows/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - turbo.json
            app_delivery:
              - apps/delivery/**
              - packages/auth/**
              - packages/client/**
              - packages/js/**
              - packages/notifications/**
              - packages/storage/**
              - packages/ui/**
              - .github/workflows/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - turbo.json
            app_app:
              - apps/app/**
              - packages/auth/**
              - packages/client/**
              - packages/directory-types/**
              - packages/email/**
              - packages/fiscalization/**
              - packages/js/**
              - packages/notifications/**
              - packages/signalco/**
              - packages/storage/**
              - packages/stripe/**
              - packages/transactional/**
              - packages/ui/**
              - .github/workflows/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - turbo.json
            app_api:
              - apps/api/**
              - packages/auth/**
              - packages/directory-types/**
              - packages/email/**
              - packages/fiscalization/**
              - packages/google/**
              - packages/js/**
              - packages/notifications/**
              - packages/signalco/**
              - packages/storage/**
              - packages/stripe/**
              - packages/transactional/**
              - packages/ui/**
              - .github/workflows/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - turbo.json
            app_storybook:
              - apps/storybook/**
              - packages/game/**
              - packages/js/**
              - packages/ui/**
              - .github/workflows/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - turbo.json
            app_status:
              - apps/status/**
              - packages/ui/**
              - .github/workflows/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - turbo.json
            app_desktop:
              - apps/desktop/**
              - .github/workflows/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - turbo.json
            packages_storage:
              - packages/storage/**
              - .github/workflows/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - turbo.json
            packages_game:
              - packages/client/**
              - packages/game/**
              - packages/js/**
              - packages/stripe/**
              - packages/ui/**
              - .github/workflows/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - turbo.json
    outputs:
      app_www: ${{ steps.filter.outputs.app_www }}
      app_news: ${{ steps.filter.outputs.app_news }}
      app_garden: ${{ steps.filter.outputs.app_garden }}
      app_farm: ${{ steps.filter.outputs.app_farm }}
      app_delivery: ${{ steps.filter.outputs.app_delivery }}
      app_app: ${{ steps.filter.outputs.app_app }}
      app_api: ${{ steps.filter.outputs.app_api }}
      app_storybook: ${{ steps.filter.outputs.app_storybook }}
      app_status: ${{ steps.filter.outputs.app_status }}
      packages_storage: ${{ steps.filter.outputs.packages_storage }}
      packages_game: ${{ steps.filter.outputs.packages_game }}

  ci_www:
    name: "CI - www"
    needs: changes
    if: success() && needs.changes.outputs.app_www == 'true'
    uses: ./.github/workflows/nextjs_ci_reusable.yml
    with:
      name: "www"
      path: "apps/www"
      vercelProjectIdSecretName: "VERCEL_PROJECT_ID_WWW"
      testShardMatrix: >-
        [
          {"name":"a11y 1/3","index":1,"total":5,"args":"tests/a11y.spec.ts --shard=1/3"},
          {"name":"a11y 2/3","index":2,"total":5,"args":"tests/a11y.spec.ts --shard=2/3"},
          {"name":"a11y 3/3","index":3,"total":5,"args":"tests/a11y.spec.ts --shard=3/3"},
          {"name":"rest 1/2","index":4,"total":5,"args":"tests/landing.spec.ts tests/search.spec.ts tests/search-interactive.spec.tsx tests/titlesPresent.spec.ts --shard=1/2"},
          {"name":"rest 2/2","index":5,"total":5,"args":"tests/landing.spec.ts tests/search.spec.ts tests/search-interactive.spec.tsx tests/titlesPresent.spec.ts --shard=2/2"}
        ]
      testShardPrepareScript: "test:prepare:routes"
    secrets: inherit

  ci_garden:
    name: "CI - garden"
    needs: changes
    if: success() && needs.changes.outputs.app_garden == 'true'
    uses: ./.github/workflows/nextjs_ci_reusable.yml
    with:
      name: "garden"
      path: "apps/garden"
      vercelProjectIdSecretName: "VERCEL_PROJECT_ID_GARDEN"
    secrets: inherit

  ci_farm:
    name: "CI - farm"
    needs: changes
    if: success() && needs.changes.outputs.app_farm == 'true'
    uses: ./.github/workflows/nextjs_ci_reusable.yml
    with:
      name: "farm"
      path: "apps/farm"
      vercelProjectIdSecretName: "VERCEL_PROJECT_ID_FARM"
    secrets: inherit

  ci_delivery:
    name: "CI - delivery"
    needs: changes
    if: success() && needs.changes.outputs.app_delivery == 'true'
    uses: ./.github/workflows/nextjs_ci_reusable.yml
    with:
      name: "delivery"
      path: "apps/delivery"
      vercelProjectIdSecretName: "VERCEL_PROJECT_ID_DELIVERY"
    secrets: inherit

  ci_app:
    name: "CI - app"
    needs: changes
    if: success() && needs.changes.outputs.app_app == 'true'
    uses: ./.github/workflows/nextjs_ci_reusable.yml
    with:
      name: "app"
      path: "apps/app"
      vercelProjectIdSecretName: "VERCEL_PROJECT_ID_APP"
    secrets: inherit

  ci_api:
    name: "CI - api"
    needs: changes
    if: success() && needs.changes.outputs.app_api == 'true'
    uses: ./.github/workflows/nextjs_ci_reusable.yml
    with:
      name: "api"
      path: "apps/api"
      vercelProjectIdSecretName: "VERCEL_PROJECT_ID_API"
    secrets: inherit

  ci_status:
    name: "CI - status"
    needs: changes
    if: success() && needs.changes.outputs.app_status == 'true'
    uses: ./.github/workflows/nextjs_ci_reusable.yml
    with:
      name: "status"
      path: "apps/status"
      vercelProjectIdSecretName: "VERCEL_PROJECT_ID_STATUS"
    secrets: inherit

  test_packages:
    name: "CI - test @gredice/storage"
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: changes
    if: success() && github.event_name == 'pull_request' &&
      needs.changes.outputs.packages_storage == 'true'
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_APP }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v6.0.8
        name: ✨ Install pnpm

      - name: ✨ Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.15.0"

      - name: ✨ Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5.0.5
        name: ✨ Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦️ Install dependencies
        run: pnpm install --frozen-lockfile --filter @gredice/storage... --filter .

      - name: ✨ Setup Vercel CLI
        run: npm i --global vercel@latest

      - name: ⚙️ Pull Vercel Environment Information
        run: vercel env pull --yes --environment=preview --token=${{
          secrets.VERCEL_TOKEN }}
        working-directory: ./packages/storage/

      - name: ⚒️ Test app
        run: pnpm test --filter=@gredice/storage

  test_game_package:
    name: "CI - test @gredice/game"
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: changes
    if: success() && github.event_name == 'pull_request' &&
      needs.changes.outputs.packages_game == 'true'
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v6.0.8
        name: ✨ Install pnpm

      - name: ✨ Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.15.0"

      - name: ✨ Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5.0.5
        name: ✨ Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦️ Install dependencies
        run: pnpm install --frozen-lockfile --filter @gredice/game... --filter .

      - name: ⚒️ Test package
        run: pnpm test --filter=@gredice/game

  ci_filter_check:
    name: "CI - verify app package filters"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: ✨ Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.15.0"

      - name: 🔎 Verify CI app filters
        run: node ./scripts/check-ci-filters.mjs

  ci_ok:
    name: "[CI] OK"
    needs:
      [
        changes,
        ci_www,
        ci_garden,
        ci_farm,
        ci_delivery,
        ci_app,
        ci_api,
        ci_status,
        test_packages,
        test_game_package,
        ci_filter_check,
      ]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: ${{ always() && (contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')) }}
